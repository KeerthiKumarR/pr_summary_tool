name: Poll and Summarize Merged PRs (Any Repo) to Drive

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts/pr-drive-summary
        run: npm install

      - name: Decode Google service account key
        run: echo "${{ secrets.GDRIVE_SERVICE_ACCOUNT_B64 }}" | base64 -d > ${{ runner.temp }}/gdrive-key.json

      - name: Poll for merged PRs and summarize
        working-directory: scripts/pr-drive-summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: ${{ vars.GH_USERNAME }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gdrive-key.json
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: node poll-and-summarize.mjs

      - name: Commit updated state
        run: |
          git config user.name "pr-summary-bot"
          git config user.email "actions@github.com"
          git add scripts/pr-drive-summary/state/last-run.json
          git diff --cached --quiet || git commit -m "Update processed-PR state [skip ci]"
          git push
